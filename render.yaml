services:
  - type: web
    name: society-payment-system
    runtime: python
    repo: https://github.com/your-username/society-payment-system
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: mysql+pymysql://username:password@host/database_name
