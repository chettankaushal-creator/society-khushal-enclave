{% extends "base.html" %}

{% block title %}Login - Society Payment System{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-building fa-3x text-primary"></i>
                        <h3 class="mt-2">Welcome Back</h3>
                        <p class="text-muted">Login to your account</p>
                    </div>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-user"></i> Username / House Number
                            </label>
                            <input type="text" name="username" class="form-control form-control-lg" 
                                   placeholder="Enter your username or house number" required autofocus>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-lock"></i> Password
                            </label>
                            <input type="password" name="password" id="password" 
                                   class="form-control form-control-lg" placeholder="Enter your password" required>
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="showPassword">
                            <label class="form-check-label" for="showPassword">Show Password</label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </form>
                    
                    <hr class="my-4">
                    <div class="text-center">
                        <small class="text-muted">
                            <i class="fas fa-info-circle"></i> Use your registered username/house number and password
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('showPassword').addEventListener('change', function() {
        var passwordInput = document.getElementById('password');
        passwordInput.type = this.checked ? 'text' : 'password';
    });
</script>
{% endblock %}
